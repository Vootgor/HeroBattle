spring:
  application:
    name: HeroBattle
  datasource:
    url: jdbc:postgresql://localhost:5432/heroBattle
    username: myuser
    password: mypassword
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
    hibernate:
      format_sql: true
      ddl-auto: none
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
  data:
    redis:
      host: localhost
      port: 6379
server:
  port: 8080
narrator:
  api:
    url: http://localhost:8082
hero-service:
  use-cache: true