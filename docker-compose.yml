version: '3.8'

services:
  db:
    image: postgres:16
    container_name: hero_battle_db
    restart: always
    environment:
      POSTGRES_DB: heroBattle
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  narrator:
    image: story-teller-app
    container_name: story_teller_app
    restart: always
    ports:
      - "8082:8082"

  app:
    build: .
    container_name: hero_battle_app
    depends_on:
      - db
      - narrator
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/heroBattle
      SPRING_DATASOURCE_USERNAME: myuser
      SPRING_DATASOURCE_PASSWORD: mypassword
      NARRATOR_API_URL: http://story-teller-app:8082
    ports:
      - "8080:8080"

volumes:
  postgres_data: