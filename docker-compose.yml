version: '3.8'

services:
  db:
    image: postgres:16
    container_name: hero_battle_db
    restart: always
    environment:
      POSTGRES_DB: heroBattle
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  narrator:
    image: story-teller-app
    container_name: story_teller_app
    restart: always
    ports:
      - "8082:8080"

volumes:
  postgres_data: